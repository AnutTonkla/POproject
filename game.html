<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Battle Boss</title>
    <link rel="stylesheet" href="CSS/background.css">
    <link rel="stylesheet" href="CSS/navbar.css">
    <link rel="stylesheet" href="CSS/front.css">
    <link rel="stylesheet" href="CSS/game_style.css"> 

        <link rel="icon" type="image/png" href="images\favicon.png">
</head>
<body>
    
    <div class="navbar-trigger">
        <span class="down-arrow">▼</span>
    </div>

    <nav class="navbar">
    <ul class="nav-links">
        <li><a href="index.html">Home</a></li> 
        <li><a href="game.html">Play Math Battle</a></li> 
    </ul>
    </nav>

    <div class="background-container"></div>

    <main class="content">
        <div id="selection-screen" class="content-box">
            <h2>Select Your Hero</h2>
            <div class="character-grid">
                <div class="char-card" onclick="chooseJob('Knight')">
                    <img src="images\Gemini_Generated_Image_mb9infmb9infmb9i.png" alt="Knight">
                    <h3>Knight</h3>
                    <p>เลขบวกลบง่ายๆ</p>
                </div>
                <div class="char-card" onclick="chooseJob('Archer')">
                    <img src="images\Gemini_Generated_Image_3yvz5a3yvz5a3yvz.png" alt="Archer">
                    <h3>Archer</h3>
                    <p>ตอบไวได้โบนัส</p>
                </div>
                <div class="char-card" onclick="chooseJob('Mage')">
                    <img src="images\Gemini_Generated_Image_m3npmvm3npmvm3np.png" alt="Mage">
                    <h3>Mage</h3>
                    <p>ตีเเรง กำหนดเวลา โจทย์สมการ x</p>
                </div>
            </div>
        </div>

    <div id="game-screen" style="display: none;" class="content-box">
        <div class="boss-ui">
            <h2 id="boss-name">Kayn (Boss)</h2>
            <div class="hp-bar"><div id="boss-hp-fill"></div></div>
            <p>HP: <span id="boss-hp-text">500/500</span></p>
        </div>

        <div class="question-box">
            <div id="timer-display" style="font-size: 2rem; color: #ffcc00; font-family: monospace; margin-bottom: 10px;">
                Time: 0.0s
            </div>

            <h1 id="display-question">Preparing Battle...</h1>
            <input type="number" id="answer-input" placeholder="?">
            <button id="submit-btn">Attack!</button>
        </div>

        <div class="player-ui">
            <h3 id="player-class-display">-</h3>
            <div class="hp-bar"><div id="player-hp-fill"></div></div>
            <p>HP: <span id="player-hp-text">0/0</span></p>
        </div>
    </div>
        </div>
        <script type="module" src="Javascript/main_game.js"></script>
</body>
</html>
